<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - FunSheets</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/style.css">
    <style>
        body { background-color: #F8FAFC; }
        .admin-header {
            background: white; padding: 20px; border-bottom: 2px solid #E2E8F0;
            display: flex; justify-content: space-between; align-items: center;
        }
        .admin-container {
            padding: 40px 20px; max-width: 1200px; margin: 0 auto;
        }
        .stat-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-bottom: 40px; }
        .stat-card {
            background: white; padding: 24px; border-radius: var(--radius-lg);
            border: 2px solid #E2E8F0; border-bottom: 4px solid #E2E8F0;
        }
        .stat-value { font-size: 2.5rem; color: var(--color-primary); font-family: 'Fredoka One', cursive; }
        
        .section-panel {
            background: white; padding: 30px; border-radius: var(--radius-lg);
            border: 2px solid #E2E8F0; margin-bottom: 40px;
        }

        .data-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .data-table th, .data-table td { padding: 15px; text-align: left; border-bottom: 1px solid #E2E8F0; }
        .data-table th { background: #F1F5F9; font-weight: 700; color: #475569; }
        
        form .form-group { margin-bottom: 15px; }
        form .btn { margin-top: 20px; }
    </style>
</head>
<body>
    <div class="admin-header">
        <a href="../index.html" class="site-logo">
            <i class="fas fa-rocket" style="color: var(--color-primary)"></i> Fun<span>Sheets</span> Admin
        </a>
        <button onclick="logout()" class="btn btn-secondary">Logout</button>
    </div>

    <div class="admin-container">
        <!-- Dashboard Stats -->
        <div class="stat-cards">
            <div class="stat-card">
                <h3>Total Worksheets</h3>
                <div class="stat-value" id="stat-worksheets">0</div>
            </div>
            <div class="stat-card">
                <h3>Total Orders</h3>
                <div class="stat-value">124</div> <!-- Dummy -->
            </div>
            <div class="stat-card">
                <h3>Total Users</h3>
                <div class="stat-value">56</div> <!-- Dummy -->
            </div>
        </div>

        <!-- Add New Worksheet -->
        <div class="section-panel">
            <h2>Add New Worksheet</h2>
            <form id="addWorksheetForm">
                <div class="grid grid-cols-2" style="gap: 20px; margin-top: 20px;">
                    <div class="form-group">
                        <label class="form-label">Title</label>
                        <input type="text" id="ws-title" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Price</label>
                        <input type="number" id="ws-price" class="form-input" value="0" required>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea id="ws-desc" class="form-input" rows="3" required></textarea>
                </div>
                <div class="grid grid-cols-3" style="gap: 20px;">
                    <div class="form-group">
                        <label class="form-label">Subject</label>
                        <input type="text" id="ws-subject" class="form-input" placeholder="e.g. math" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Class Level</label>
                        <input type="text" id="ws-class" class="form-input" placeholder="e.g. kg" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Difficulty</label>
                        <select id="ws-difficulty" class="form-input">
                            <option>Easy</option>
                            <option>Medium</option>
                            <option>Hard</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-2" style="gap: 20px;">
                    <div class="form-group">
                        <label class="form-label">Thumbnail Image (PNG/JPG)</label>
                        <input type="file" id="ws-thumbnail" class="form-input" accept="image/*" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Worksheet File (PDF)</label>
                        <input type="file" id="ws-file" class="form-input" accept="application/pdf" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Upload Worksheet</button>
            </form>
        </div>

        <!-- Manage Worksheets -->
        <div class="section-panel">
            <h2>Manage Worksheets</h2>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Subject</th>
                        <th>Class</th>
                        <th>Price</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="worksheets-tbody">
                    <tr><td colspan="5" style="text-align: center;"><i class="fas fa-spinner fa-spin"></i> Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="../scripts/api.js"></script>
    <script src="../scripts/admin.js"></script>
</body>
</html>
