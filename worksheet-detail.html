<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinosaur Addition Fun - FunSheets</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles/style.css">
    <style>
        .product-container {
            display: flex;
            gap: 60px;
            padding: 40px 0;
            background: white;
            border-radius: var(--radius-lg);
            border: 2px solid #E5E5E5;
            border-bottom: 6px solid #E5E5E5;
        }

        .product-gallery {
            flex: 1;
            padding: 24px;
        }

        .main-image {
            width: 100%;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            background: #F0F4F8;
            border: 2px solid #E5E5E5;
            margin-bottom: 20px;
        }

        .thumbnails {
            display: flex;
            gap: 16px;
        }

        .thumbnail {
            width: 80px;
            height: 80px;
            border-radius: var(--radius-md);
            cursor: pointer;
            border: 4px solid transparent;
            transition: var(--transition);
        }

        .thumbnail.active {
            border-color: var(--color-primary);
        }

        .product-details {
            flex: 1;
            padding: 24px 24px 24px 0;
        }

        .product-title {
            font-size: 3rem;
            color: var(--color-text-main);
            margin-bottom: 10px;
        }

        .product-rating {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            font-weight: 700;
            color: var(--color-text-muted);
        }

        .product-price {
            font-family: 'Fredoka One', cursive;
            font-size: 3rem;
            color: var(--color-primary);
            margin-bottom: 24px;
        }

        .product-desc {
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 30px;
            color: #64748B;
        }

        .product-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 40px;
            padding: 20px;
            background: #F8FAFC;
            border-radius: var(--radius-md);
            border: 2px solid #E2E8F0;
        }

        .meta-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .meta-label {
            font-size: 0.9rem;
            color: var(--color-text-muted);
            font-weight: 700;
        }

        .meta-value {
            font-weight: 800;
            color: var(--color-text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .add-actions {
            display: flex;
            gap: 16px;
        }

        @media (max-width: 900px) {
            .product-container {
                flex-direction: column;
                gap: 20px;
            }
            .product-details {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <fun-header></fun-header>

    <div style="background-color: var(--color-bg); padding: 40px 0;">
        <div class="container">
            <div id="worksheet-detail-container" class="product-container">
                <p style="text-align: center; width: 100%; padding: 40px;"><i class="fas fa-spinner fa-spin text-primary"></i> Loading details...</p>
            </div>
        </div>
    </div>

    <!-- Quick Footer -->
    <fun-footer></fun-footer>

    <script src="scripts/main.js"></script>
<script src="components/header.js"></script>
    <script src="components/footer.js"></script>
    <script src="components/worksheetCard.js"></script>
    <script src="scripts/api.js"></script>
</body>
</html>
