<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solve Worksheet - FunSheets</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles/style.css">
    <!-- Canvas Confetti library for success celebrations -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        .solver-wrapper {
            background-color: var(--color-bg);
            padding: 50px 0;
            min-height: 80vh;
        }

        .solver-card {
            background: white;
            border-radius: var(--radius-lg);
            border: 3px solid #E5E5E5;
            border-bottom: 8px solid #E5E5E5;
            padding: 40px;
            max-width: 800px;
            margin: 0 auto;
        }

        .solver-header {
            border-bottom: 2px dashed #E5E5E5;
            padding-bottom: 20px;
            margin-bottom: 30px;
            text-align: center;
        }

        .solver-title {
            font-size: 2.5rem;
            color: var(--color-primary);
            margin-bottom: 10px;
        }

        .solver-meta {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--color-text-muted);
            margin-bottom: 20px;
        }

        .solver-meta span {
            background: #F0F4F8;
            padding: 6px 16px;
            border-radius: var(--radius-pill);
            color: var(--color-text-main);
        }

        /* Mascot Styles */
        .mascot-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            background: #FFFBEB;
            border: 3px solid #FCD34D;
            border-bottom: 6px solid #FCD34D;
            border-radius: var(--radius-md);
            padding: 15px 25px;
            transition: var(--transition);
        }

        .mascot-character {
            font-size: 4rem;
            animation: float 3s ease-in-out infinite;
            cursor: pointer;
            transition: transform 0.2s;
            user-select: none;
        }

        .mascot-character:hover {
            transform: scale(1.2) rotate(10deg);
        }

        .mascot-bubble {
            background: white;
            border: 2px solid #FCD34D;
            border-radius: var(--radius-sm);
            padding: 12px 20px;
            font-size: 1.2rem;
            font-weight: 800;
            color: #78350F;
            position: relative;
            max-width: 480px;
            box-shadow: 0 4px 0 rgba(252, 211, 77, 0.2);
            flex: 1;
        }

        .mascot-bubble::after {
            content: '';
            position: absolute;
            right: -10px;
            top: 50%;
            transform: translateY(-50%);
            border-width: 10px 0 10px 10px;
            border-style: solid;
            border-color: transparent transparent transparent white;
            z-index: 2;
        }

        .mascot-bubble::before {
            content: '';
            position: absolute;
            right: -13px;
            top: 50%;
            transform: translateY(-50%);
            border-width: 11px 0 11px 11px;
            border-style: solid;
            border-color: transparent transparent transparent #FCD34D;
            z-index: 1;
        }

        /* Progress Bar */
        .progress-container {
            background: #E2E8F0;
            border-radius: var(--radius-pill);
            height: 18px;
            margin-bottom: 35px;
            overflow: hidden;
            border: 2px solid #CBD5E1;
            position: relative;
        }

        .progress-bar {
            background: linear-gradient(90deg, var(--color-primary), var(--color-secondary));
            height: 100%;
            width: 0%;
            border-radius: var(--radius-pill);
            transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .question-box {
            background: #F8FAFC;
            border: 3px solid #E2E8F0;
            border-bottom: 6px solid #E2E8F0;
            border-radius: var(--radius-md);
            padding: 24px;
            margin-bottom: 28px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .question-box.correct {
            border-color: var(--color-secondary);
            border-bottom-color: var(--color-secondary-dark);
            background: #F0FDF4;
            transform: scale(1.02);
        }

        .question-box.incorrect {
            border-color: var(--color-red);
            border-bottom-color: var(--color-red-dark);
            background: #FEF2F2;
            transform: scale(0.98);
        }

        .question-number {
            font-family: 'Fredoka One', cursive;
            color: var(--color-primary);
            font-size: 1.25rem;
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--color-text-main);
            margin-bottom: 20px;
        }

        /* MCQ Options */
        .options-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        @media (max-width: 600px) {
            .options-list {
                grid-template-columns: 1fr;
            }
        }

        .option-item {
            display: flex;
            align-items: center;
            position: relative;
        }

        .option-item input[type="radio"] {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .option-label {
            width: 100%;
            background: white;
            border: 3px solid #E2E8F0;
            border-bottom: 6px solid #E2E8F0;
            border-radius: var(--radius-sm);
            padding: 16px;
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--color-text-main);
            cursor: pointer;
            text-align: center;
            transition: all 0.15s ease;
            user-select: none;
        }

        .option-label:hover {
            background: #F8FAFC;
            border-color: #CBD5E1;
        }

        .option-label:active {
            transform: translateY(3px);
            border-bottom-width: 3px;
        }

        .option-item input[type="radio"]:checked + .option-label {
            background: #E0F2FE;
            border-color: var(--color-primary);
            border-bottom-color: var(--color-primary-dark);
            color: var(--color-primary-dark);
            transform: translateY(2px);
            border-bottom-width: 4px;
        }

        .option-item.correct-answer .option-label {
            background: #DCFCE7 !important;
            border-color: var(--color-secondary) !important;
            border-bottom-color: var(--color-secondary-dark) !important;
            color: var(--color-secondary-dark) !important;
        }

        .option-item.incorrect-answer .option-label {
            background: #FEE2E2 !important;
            border-color: var(--color-red) !important;
            border-bottom-color: var(--color-red-dark) !important;
            color: var(--color-red-dark) !important;
        }

        /* Text Input */
        .text-input-container {
            position: relative;
        }

        .text-answer-input {
            width: 100%;
            padding: 16px;
            font-size: 1.3rem;
            font-weight: 800;
            border: 3px solid #E2E8F0;
            border-bottom: 6px solid #E2E8F0;
            border-radius: var(--radius-sm);
            outline: none;
            transition: var(--transition);
        }

        .text-answer-input:focus {
            border-color: var(--color-primary);
            border-bottom-color: var(--color-primary-dark);
        }

        .feedback-message {
            margin-top: 15px;
            font-weight: 800;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .feedback-correct {
            color: var(--color-secondary-dark);
        }

        .feedback-incorrect {
            color: var(--color-red-dark);
        }

        /* Results Card */
        .results-panel {
            text-align: center;
            padding: 30px;
            display: none;
        }

        .score-circle {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: var(--color-bg);
            border: 8px solid var(--color-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
            animation: bounce-scale 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) infinite alternate;
        }

        .score-value {
            font-family: 'Fredoka One', cursive;
            font-size: 3.5rem;
            color: var(--color-primary);
            line-height: 1;
        }

        .score-label {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--color-text-muted);
        }

        .score-feedback-text {
            font-size: 2.2rem;
            font-family: 'Fredoka One', cursive;
            color: var(--color-secondary-dark);
            margin-bottom: 20px;
        }

        /* Interactive Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @keyframes wiggle {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px) rotate(-3deg); }
            40%, 80% { transform: translateX(10px) rotate(3deg); }
        }

        @keyframes bounce-scale {
            0% { transform: scale(1); }
            100% { transform: scale(1.06); }
        }

        .wiggle-effect {
            animation: wiggle 0.5s ease-in-out;
        }

        .bounce-effect {
            animation: bounce-scale 0.5s ease-in-out;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <fun-header></fun-header>

    <div class="solver-wrapper">
        <div class="container">
            <div id="solver-container" class="solver-card">
                <div style="text-align: center; padding: 40px;">
                    <i class="fas fa-spinner fa-spin text-primary" style="font-size: 3rem; margin-bottom: 20px;"></i>
                    <h2>Loading interactive worksheet...</h2>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <fun-footer></fun-footer>

    <script src="scripts/main.js"></script>
    <script src="components/header.js"></script>
    <script src="components/footer.js"></script>
    <script src="components/worksheetCard.js"></script>
    <script src="scripts/api.js"></script>
    <script src="scripts/interactive-solve.js"></script>
</body>
</html>
