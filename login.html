<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - FunSheets</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles/style.css">
    <style>
        body {
            background-color: var(--color-bg);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .login-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .login-card {
            background: white;
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            border: 2px solid #E5E5E5;
            border-bottom: 6px solid #E5E5E5;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .login-logo {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .login-title {
            font-size: 2rem;
            margin-bottom: 10px;
            color: var(--color-text-main);
        }

        .login-subtitle {
            color: var(--color-text-muted);
            margin-bottom: 30px;
            font-weight: 700;
        }

        .social-login {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .social-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            border-radius: var(--radius-md);
            border: 2px solid #E2E8F0;
            background: white;
            font-family: inherit;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }

        .social-btn:hover {
            background: #F8FAFC;
        }
        
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--color-text-muted);
            margin-bottom: 25px;
            font-weight: 600;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 2px solid #E2E8F0;
        }

        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-size: 0.95rem;
            font-weight: 700;
        }

        .links {
            color: var(--color-primary);
            text-decoration: none;
        }

        .links:hover { text-decoration: underline; }
        
        /* Fun background elements matching Duolingo vibe */
        .bg-element {
            position: fixed;
            z-index: 1;
            color: var(--color-text-muted);
            opacity: 0.1;
        }
    </style>
</head>
<body>
    <i class="fas fa-star bg-element animate-bounce" style="top: 10%; left: 10%; font-size: 4rem;"></i>
    <i class="fas fa-shapes bg-element" style="bottom: 15%; left: 20%; font-size: 5rem; transform: rotate(15deg);"></i>
    <i class="fas fa-apple-alt bg-element animate-bounce" style="top: 20%; right: 15%; font-size: 4rem;"></i>
    <i class="fas fa-book bg-element" style="bottom: 10%; right: 10%; font-size: 6rem; transform: rotate(-20deg);"></i>
    
    <!-- Minimal Header -->
    <fun-header></fun-header>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-logo text-primary">
                <i class="fas fa-child"></i>
            </div>
            <h1 class="login-title">Welcome Back!</h1>
            <p class="login-subtitle">Ready for more fun learning?</p>

            <div class="social-login">
                <button class="social-btn">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="20" alt="Google"> Google
                </button>
                <button class="social-btn">
                    <i class="fab fa-facebook text-primary" style="font-size: 1.2rem;"></i> Facebook
                </button>
            </div>

            <div class="divider">OR</div>

            <form id="loginForm" style="text-align: left;">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                </div>

                <div class="form-options">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                        <input type="checkbox" checked style="width: 18px; height: 18px;">
                        Remember me
                    </label>
                    <a href="#" class="links">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1.25rem;">Sign In</button>
            </form>

            <p style="margin-top: 30px; font-weight: 700; color: var(--color-text-muted);">
                New parents here? <a href="#" class="links" style="color: var(--color-secondary);">Sign Up Free</a>
            </p>
        </div>
    </div>
<script src="components/header.js"></script>
    <script src="components/footer.js"></script>
    <script src="components/worksheetCard.js"></script>
    <script src="scripts/api.js"></script>
    <script src="scripts/login.js"></script>
</body>
</html>
