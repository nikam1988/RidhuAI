<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Worksheets - FunSheets</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles/style.css">
    <style>
        .catalog-container {
            display: flex;
            gap: 40px;
            padding: 40px 0;
        }

        .sidebar {
            width: 280px;
            flex-shrink: 0;
            background: white;
            padding: 24px;
            border-radius: var(--radius-lg);
            border: 2px solid #E5E5E5;
            border-bottom: 6px solid #E5E5E5;
            height: fit-content;
        }

        .main-content {
            flex: 1;
        }

        .filter-group {
            margin-bottom: 30px;
        }

        .filter-group h4 {
            font-size: 1.2rem;
            color: var(--color-text-main);
            margin-bottom: 12px;
            border-bottom: 2px solid #F0F4F8;
            padding-bottom: 8px;
        }

        /* Custom Checkbox */
        .filter-label {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            font-size: 1.05rem;
            color: var(--color-text-main);
            font-weight: 600;
        }

        .filter-label input {
            appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid #CBD5E1;
            border-radius: 6px;
            outline: none;
            transition: var(--transition);
            position: relative;
            cursor: pointer;
        }

        .filter-label input:checked {
            background-color: var(--color-primary);
            border-color: var(--color-primary-dark);
        }

        .filter-label input:checked::after {
            content: '\f00c';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            color: white;
            font-size: 14px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .worksheets-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            transition: opacity 0.3s ease;
        }

        .page-header {
            background-color: var(--color-primary);
            color: white;
            padding: 40px 0;
            text-align: left;
        }

        .page-header h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            background: white;
            padding: 16px 24px;
            border-radius: var(--radius-lg);
            border: 2px solid #E5E5E5;
            border-bottom: 4px solid #E5E5E5;
        }

        .sort-select {
            padding: 10px 16px;
            border-radius: var(--radius-md);
            border: 2px solid #E2E8F0;
            font-family: inherit;
            font-weight: 700;
            color: var(--color-text-main);
            outline: none;
            background-color: #F8FAFC;
        }

        .search-bar {
            position: relative;
            width: 300px;
        }

        .search-bar input {
            width: 100%;
            padding: 12px 20px 12px 40px;
            border-radius: var(--radius-pill);
            border: 2px solid #E2E8F0;
            font-family: inherit;
            font-weight: 600;
            outline: none;
        }

        .search-bar i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94A3B8;
        }

        @media (max-width: 992px) {
            .worksheets-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .catalog-container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
            }
        }

        @media (max-width: 600px) {
            .worksheets-grid {
                grid-template-columns: 1fr;
            }
            .header-controls {
                flex-direction: column;
                gap: 16px;
                align-items: flex-start;
            }
            .search-bar { width: 100%; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <fun-header></fun-header>

    <div class="page-header">
        <div class="container">
            <h1>Explore Worksheets</h1>
            <p style="font-size: 1.1rem; font-weight: 700;">Find perfect learning materials for your child.</p>
        </div>
    </div>

    <!-- Catalog Section -->
    <section class="section">
        <div class="container catalog-container">
            <!-- Sidebar / Filters -->
            <aside class="sidebar">
                <div class="filter-group">
                    <h4>Class / Grade</h4>
                    <label class="filter-label"><input type="checkbox"> Kindergarten</label>
                    <label class="filter-label"><input type="checkbox" checked> Grade 1 & 2</label>
                    <label class="filter-label"><input type="checkbox"> Grade 3 & 4</label>
                    <label class="filter-label"><input type="checkbox"> Grade 5 & 6</label>
                    <label class="filter-label"><input type="checkbox"> High School</label>
                </div>

                <div class="filter-group">
                    <h4>Subject</h4>
                    <div style="display: flex; flex-wrap: wrap; gap: 8px;">
                        <button class="btn filter-btn btn-primary" style="padding: 8px 16px; font-size: 0.9rem;">Math</button>
                        <button class="btn filter-btn" style="padding: 8px 16px; font-size: 0.9rem;">English</button>
                        <button class="btn filter-btn" style="padding: 8px 16px; font-size: 0.9rem;">Science</button>
                        <button class="btn filter-btn" style="padding: 8px 16px; font-size: 0.9rem;">Arts</button>
                        <button class="btn filter-btn" style="padding: 8px 16px; font-size: 0.9rem;">Logic</button>
                    </div>
                </div>

                <div class="filter-group">
                    <h4>Difficulty</h4>
                    <label class="filter-label"><input type="checkbox" checked> Easy (Starter)</label>
                    <label class="filter-label"><input type="checkbox"> Medium (Intermediate)</label>
                    <label class="filter-label"><input type="checkbox"> Hard (Advanced)</label>
                </div>
                
                <button class="btn btn-yellow" style="width: 100%;">Apply Filters</button>
            </aside>

            <!-- Main Content Grid -->
            <main class="main-content">
                <div class="header-controls">
                    <div class="search-bar">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="Search topics, subjects...">
                    </div>
                    <div>
                        <span style="font-weight: 700; color: var(--color-text-muted); margin-right: 10px;">Sort by:</span>
                        <select class="sort-select">
                            <option>Most Popular</option>
                            <option>Newest First</option>
                            <option>Price: Low to High</option>
                            <option>Price: High to Low</option>
                        </select>
                    </div>
                </div>

                <div id="all-worksheets-grid" class="worksheets-grid">
                    <p style="grid-column: span 3; text-align: center;"><i class="fas fa-spinner fa-spin text-primary"></i> Loading worksheets...</p>
                </div>

                <!-- Pagination (UI only) -->
                <div style="display: flex; justify-content: center; margin-top: 40px; gap: 8px;">
                    <button class="btn" style="padding: 10px 16px;"><i class="fas fa-chevron-left"></i></button>
                    <button class="btn btn-primary" style="padding: 10px 16px;">1</button>
                    <button class="btn" style="padding: 10px 16px;">2</button>
                    <button class="btn" style="padding: 10px 16px;">3</button>
                    <button class="btn" style="padding: 10px 16px;"><i class="fas fa-chevron-right"></i></button>
                </div>
            </main>
        </div>
    </section>

    <!-- Footer -->
    <fun-footer></fun-footer>

    <script src="scripts/main.js"></script>
<script src="components/header.js"></script>
    <script src="components/footer.js"></script>
    <script src="components/worksheetCard.js"></script>
    <script src="scripts/api.js"></script>
</body>
</html>
